<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Vision Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e3e6e8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: #1c2128; border-radius: 12px; border: 1px solid #30363d; overflow: hidden; }
        #chat { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 10px; max-width: 80%; }
        .user { background: #f55036; align-self: flex-end; }
        .ia { background: #30363d; align-self: flex-start; }
        .input-area { display: flex; padding: 15px; background: #22272e; gap: 5px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #0d1117; color: white; }
        button { padding: 10px; background: #f55036; color: white; border: none; cursor: pointer; font-weight: bold; }
        #preview-img { max-width: 100px; display: none; margin: 10px; border: 2px solid #f55036; }
    </style>
</head>
<body>

    <h2>GORDINHO.IA - MODO LLAMA 3.2</h2>
    <p style="font-size: 12px; color: #888;">Ative o acesso em: cors-anywhere.herokuapp.com/corsdemo</p>

    <div id="chat-container">
        <img id="preview-img">
        <div id="chat">
            <div class="message ia">Aguardando seu comando...</div>
        </div>
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Mande sua dúvida...">
            <button id="btnEnviar">ENVIAR</button>
            <button id="btnUpload" style="background:#444">FOTO</button>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
    </div>

    <script>
        const HF_TOKEN = "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";
        const PROXY = "https://cors-anywhere.herokuapp.com/"; // Pula o erro de conexão
        const API_URL = "https://api-inference.huggingface.co/v1/chat/completions";

        let base64Image = null;

        document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
        
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                base64Image = ev.target.result;
                document.getElementById('preview-img').src = ev.target.result;
                document.getElementById('preview-img').style.display = "block";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        async function enviarParaIA() {
            const texto = document.getElementById('pergunta').value;
            if(!texto && !base64Image) return;

            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="message user">${texto || "Analise a imagem"}</div>`;
            document.getElementById('pergunta').value = "";

            try {
                const response = await fetch(PROXY + API_URL, { // PROXY + URL evita o erro de conexão
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json",
                        "x-requested-with": "XMLHttpRequest"
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.2-11B-Vision-Instruct",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: texto || "Descreva esta imagem" },
                                    ...(base64Image ? [{ type: "image_url", image_url: { url: base64Image } }] : [])
                                ]
                            }
                        ],
                        max_tokens: 200
                    })
                });

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;
                
                chat.innerHTML += `<div class="message ia">${respostaIA}</div>`;
            } catch (err) {
                chat.innerHTML += `<div class="message ia" style="color:red">Erro: Ative o CORS no link acima e tente novamente!</div>`;
                console.error(err);
            }
            chat.scrollTop = chat.scrollHeight;
        }

        document.getElementById('btnEnviar').onclick = enviarParaIA;
    </script>
</body>
</html>
