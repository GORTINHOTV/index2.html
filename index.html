<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e3e6e8; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-container { width: 100%; max-width: 600px; background: #1c2128; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #30363d; }
        #chat { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px; border-radius: 15px; max-width: 85%; word-wrap: break-word; }
        .user { background: #f55036; align-self: flex-end; }
        .ia { background: #30363d; align-self: flex-start; }
        .input-area { display: flex; padding: 15px; background: #22272e; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0d1117; color: white; }
        button { padding: 10px; cursor: pointer; border-radius: 8px; border: none; background: #f55036; color: white; font-weight: bold; }
        .controls { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>GORDINHO.IA PRO</h2>
    
    <div class="controls">
        <button onclick="limparHistorico()">Limpar Histórico</button>
    </div>

    <div id="chat-container">
        <div id="chat"></div>
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Escreva ou fale..." onkeypress="if(event.key === 'Enter') perguntarIA()">
            <button id="btnEnviar" onclick="perguntarIA()">Enviar</button>
        </div>
    </div>

    <script>
        const API_KEY = "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";
        let historico = JSON.parse(localStorage.getItem('chat_ia')) || [];

        // Carregar histórico ao abrir
        const chatDiv = document.getElementById('chat');
        historico.forEach(msg => {
            chatDiv.innerHTML += `<div class="message ${msg.role === 'user' ? 'user' : 'ia'}">${msg.content}</div>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;

        function falar(texto) {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'pt-BR';
            window.speechSynthesis.speak(utterance);
        }

        function limparHistorico() {
            localStorage.removeItem('chat_ia');
            location.reload();
        }

        async function perguntarIA() {
            const input = document.getElementById('pergunta');
            const btn = document.getElementById('btnEnviar');
            const texto = input.value.trim();

            if (!texto) return;
            btn.disabled = true;
            input.value = '';

            // Adicionar ao chat e ao histórico
            chatDiv.innerHTML += `<div class="message user">${texto}</div>`;
            historico.push({ role: "user", content: texto });
            
            chatDiv.scrollTop = chatDiv.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: historico, // Envia o histórico para a IA ter memória!
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;

                chatDiv.innerHTML += `<div class="message ia">${respostaIA}</div>`;
                historico.push({ role: "assistant", content: respostaIA });
                
                // Salvar no navegador
                localStorage.setItem('chat_ia', JSON.stringify(historico));
                
                // Falar a resposta
                falar(respostaIA);

            } catch (error) {
                chatDiv.innerHTML += `<div class="message ia" style="color:red">Erro: ${error.message}</div>`;
            }

            btn.disabled = false;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    </script>
</body>
</html>
