<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Vision Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e3e6e8; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        h2 { color: #f55036; text-transform: uppercase; margin-bottom: 10px; }
        #chat-container { width: 100%; max-width: 600px; background: #1c2128; border-radius: 12px; overflow: hidden; border: 1px solid #30363d; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        #chat { height: 450px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { background: #f55036; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ia { background: #30363d; color: #e3e6e8; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #444; }
        .input-area { display: flex; padding: 15px; background: #22272e; gap: 8px; flex-wrap: wrap; border-top: 1px solid #30363d; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #0d1117; color: white; outline: none; min-width: 200px; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 8px; border: none; background: #f55036; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #d43f2a; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-secondary { background: #30363d; color: white; }
        #preview-container { display: none; padding: 10px; background: #0d1117; text-align: center; border-bottom: 1px solid #333; }
        #preview-img { max-width: 150px; border-radius: 8px; border: 2px solid #f55036; }
    </style>
</head>
<body>

    <h2>GORDINHO.IA VISION PRO</h2>
    
    <div id="chat-container">
        <div id="preview-container">
            <img id="preview-img" src="" alt="Preview">
        </div>
        <div id="chat">
            <div class="message ia">Token hf_vCez... ativo! Se der erro, aperte F12 e veja o Console. Vamos tentar de novo!</div>
        </div>
        
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Diga algo ou mande imagem..." autocomplete="off">
            <button id="btnEnviar">Enviar</button>
            <button class="btn-secondary" id="btnUpload">+ Foto</button>
            <button class="btn-secondary" id="btnTela">📡 Tela</button>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>
    </div>

    <script>
        const HF_TOKEN = "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"; 
        const MODELO = "microsoft/Phi-3.5-vision-instruct";
        
        let screenStream = null;
        let base64Image = null;

        const chatDiv = document.getElementById('chat');
        const inputPergunta = document.getElementById('pergunta');
        const btnEnviar = document.getElementById('btnEnviar');
        const btnTela = document.getElementById('btnTela');
        const btnUpload = document.getElementById('btnUpload');
        const fileInput = document.getElementById('fileInput');

        function falar(texto) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'pt-BR';
            window.speechSynthesis.speak(utterance);
        }

        btnTela.onclick = async () => {
            try {
                if (screenStream) {
                    screenStream.getTracks().forEach(t => t.stop());
                    screenStream = null;
                    btnTela.innerText = "📡 Tela";
                    document.getElementById('preview-container').style.display = "none";
                } else {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                    btnTela.innerText = "📺 ON";
                    document.getElementById('preview-container').style.display = "block";
                }
            } catch (e) { console.error(e); }
        };

        btnUpload.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    base64Image = ev.target.result;
                    document.getElementById('preview-img').src = ev.target.result;
                    document.getElementById('preview-container').style.display = "block";
                };
                reader.readAsDataURL(file);
            }
        };

        async function capturarFrame() {
            const video = document.createElement('video');
            video.srcObject = screenStream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.5);
            video.pause();
            return data;
        }

        async function perguntarIA() {
            const texto = inputPergunta.value.trim();
            if (!texto && !base64Image && !screenStream) return;

            btnEnviar.disabled = true;
            const prompt = texto || "Descreva esta imagem.";
            chatDiv.innerHTML += `<div class="message user">${prompt}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            inputPergunta.value = '';

            let imgData = base64Image;
            if (screenStream) imgData = await capturarFrame();

            try {
                // Montagem do payload simplificada para evitar erros de parse
                let bodyContent = {
                    inputs: imgData ? { image: imgData.split(',')[1], text: prompt } : prompt,
                    parameters: { max_new_tokens: 300 }
                };

                const response = await fetch(`https://api-inference.huggingface.co/models/${MODELO}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(bodyContent)
                });

                const result = await response.json();

                if (response.ok) {
                    let respostaRaw = Array.isArray(result) ? result[0].generated_text : result.generated_text;
                    let msgFinal = respostaRaw.replace(prompt, "").trim() || "Processado com sucesso!";
                    chatDiv.innerHTML += `<div class="message ia">${msgFinal}</div>`;
                    falar(msgFinal);
                } else {
                    console.log("Erro API:", result);
                    if (JSON.stringify(result).includes("loading")) {
                        chatDiv.innerHTML += `<div class="message ia">Servidor ligando... Tente de novo em 10s!</div>`;
                    } else {
                        chatDiv.innerHTML += `<div class="message ia">Erro na API: ${result.error || 'Verifique o Token'}</div>`;
                    }
                }
            } catch (err) {
                console.error("Erro Fetch:", err);
                chatDiv.innerHTML += `<div class="message ia" style="color:red">Erro de conexão local ou internet.</div>`;
            }

            btnEnviar.disabled = false;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            base64Image = null;
        }

        btnEnviar.onclick = perguntarIA;
        inputPergunta.onkeypress = (e) => { if(e.key === 'Enter') perguntarIA(); };
    </script>
</body>
</html>
