<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gordinho Search - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* CABEÇALHO AZUL (IGUAL AO PRINT) */
        .header-blue { width: 100%; background: #0077b5; padding: 15px; text-align: center; font-weight: bold; font-size: 1.2rem; position: relative; display: none; }
        .close-x { position: absolute; right: 20px; top: 15px; cursor: pointer; }

        .search-box { background: #0f0f0f; border: 1px solid #e50914; border-radius: 15px; padding: 25px; width: 95%; max-width: 450px; margin-top: 40px; text-align: center; }
        .lion-icon { width: 60px; margin-bottom: 10px; }
        
        h1 { color: #e50914; font-size: 1.4rem; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 15px; outline: none; }
        button.btn-search { width: 100%; padding: 15px; background: #e50914; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #status { margin-top: 15px; color: #ffca28; font-size: 0.9rem; }

        /* LISTA DE EPISÓDIOS (ESTILO DO SEU PRINT) */
        .episode-list { width: 100%; background: #141418; display: none; margin-top: 10px; }
        .episode-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .episode-item:hover { background: #1f1f23; }
        .play-btn { width: 35px; height: 35px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 15px; color: black; flex-shrink: 0; font-size: 0.8rem; }
        .ep-text b { display: block; font-size: 1rem; color: #eee; }
        .ep-text span { font-size: 0.75rem; color: #777; }

        /* RESULTADO FINAL */
        #copyBox { display: none; position: fixed; bottom: 20px; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #28a745; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <div id="headerBlue" class="header-blue">
        <span id="titleTarget">NOME DO FILME</span>
        <span class="close-x" onclick="resetar()">✕</span>
    </div>

    <div id="mainSearch" class="search-box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Brave_container_icon.png" class="lion-icon">
        <h1>GORDINHO SEARCH</h1>
        <input type="text" id="movieInput" placeholder="Ex: Cobra Kai">
        <button class="btn-search" onclick="buscar()">BUSCAR AGORA 🚀</button>
        <div id="status"></div>
    </div>

    <div id="episodeList" class="episode-list"></div>

    <div id="copyBox">
        <p style="color:#28a745; font-size: 0.8rem; margin-bottom: 5px;">LINK CAPTURADO:</p>
        <p id="linkFinal" style="font-family: monospace; font-size: 0.7rem; color: #aaa; margin-bottom: 10px; word-break: break-all;"></p>
        <button onclick="copiar()" style="background:#333; color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer;">COPIAR</button>
    </div>

<script>
    const proxy = "https://api.allorigins.win/get?url=";

    async function buscar() {
        const query = document.getElementById('movieInput').value;
        const status = document.getElementById('status');
        if(!query) return;

        status.innerText = "🔍 Buscando no servidor...";
        
        try {
            const urlBusca = `https://www.pobreflixtv.sarl/?s=${encodeURIComponent(query)}`;
            const response = await fetch(proxy + encodeURIComponent(urlBusca));
            const data = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            const resultados = doc.querySelectorAll('.result-item article, .items article');

            if(resultados.length > 0) {
                mostrarResultados(resultados);
            } else {
                status.innerText = "❌ Nenhum resultado encontrado.";
            }
        } catch (err) {
            status.innerText = "⚠️ Erro de rede. Tente novamente.";
        }
    }

    function mostrarResultados(artigos) {
        const list = document.getElementById('episodeList');
        const searchBox = document.getElementById('mainSearch');
        searchBox.style.display = "none";
        list.style.display = "block";
        list.innerHTML = "";

        artigos.forEach(art => {
            const titulo = art.querySelector('h3, .title')?.innerText;
            const link = art.querySelector('a')?.href;
            
            const div = document.createElement('div');
            div.className = 'episode-item';
            div.onclick = () => extrair(link, titulo);
            div.innerHTML = `
                <div class="play-btn">▶</div>
                <div class="ep-text">
                    <b>${titulo}</b>
                    <span>Toque para capturar o código Streamtape</span>
                </div>
            `;
            list.appendChild(div);
        });
    }

    async function extrair(url, titulo) {
        document.getElementById('status').innerText = "🎣 Pescando link...";
        document.getElementById('headerBlue').style.display = "block";
        document.getElementById('titleTarget').innerText = titulo.toUpperCase();
        
        try {
            const response = await fetch(proxy + encodeURIComponent(url));
            const data = await response.json();
            
            // Procura o Streamtape no código
            const regex = /https?:\/\/streamtape\.com\/(v|e)\/[a-zA-Z0-9]+/g;
            const found = data.contents.match(regex);

            if(found) {
                let link = found[0].replace('/v/', '/e/');
                document.getElementById('linkFinal').innerText = link;
                document.getElementById('copyBox').style.display = "block";
            } else {
                alert("Streamtape não disponível para este item.");
            }
        } catch (e) {
            alert("Erro ao extrair link.");
        }
    }

    function copiar() {
        const txt = document.getElementById('linkFinal').innerText;
        navigator.clipboard.writeText(txt);
        alert("Copiado!");
    }

    function resetar() {
        location.reload();
    }
</script>
</body>
</html>
