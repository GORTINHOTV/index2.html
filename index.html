<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GODINHO.IA - GROQ</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #0b0e11; 
            color: #e3e6e8; 
            margin: 0;
            padding: 20px;
        }
        h2 { color: #f55036; }
        #chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: #1c2128;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat { 
            height: 400px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { background: #f55036; color: white; align-self: flex-end; }
        .ia { background: #30363d; color: #e3e6e8; align-self: flex-start; }
        
        .input-area { 
            display: flex; 
            padding: 15px; 
            background: #22272e; 
            border-top: 1px solid #444; 
        }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #0d1117; 
            color: white; 
            outline: none;
        }
        button { 
            margin-left: 10px; 
            padding: 10px 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #f55036; 
            color: white; 
            font-weight: bold; 
            transition: 0.3s;
        }
        button:hover { background: #d43f2a; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h2>Chat IA</h2>
    
    <div id="chat-container">
        <div id="chat">
            <div class="message ia">Olá! Como posso te ajudar hoje?</div>
        </div>
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Pergunte algo..." onkeypress="if(event.key === 'Enter') perguntarIA()">
            <button id="btnEnviar" onclick="perguntarIA()">Enviar</button>
        </div>
    </div>

    <script>
        const API_KEY = "Gsk_mBR9lhxLWFpCRy8ilFH9WGdyb3FYbNdXd181dZBA1NPwxFSPlPvp";

        async function perguntarIA() {
            const input = document.getElementById('pergunta');
            const chat = document.getElementById('chat');
            const btn = document.getElementById('btnEnviar');
            const texto = input.value.trim();

            if (!texto) return;

            // Desativar botão e limpar input
            btn.disabled = true;
            input.value = '';

            // Mostrar mensagem do usuário
            chat.innerHTML += `<div class="message user">${texto}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [{ role: "user", content: texto }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                const respostaIA = data.choices[0].message.content;

                // Mostrar resposta da IA
                chat.innerHTML += `<div class="message ia">${respostaIA}</div>`;
            } catch (error) {
                chat.innerHTML += `<div class="message ia" style="color: red;">Erro ao conectar com a IA. Verifique sua chave ou conexão.</div>`;
            }

            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
