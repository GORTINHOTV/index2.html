<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Oficial</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; word-wrap: break-word; }
        .user { background: #007bff; align-self: flex-end; }
        .bot { background: #333; align-self: flex-start; }
        #input-area { padding: 15px; background: #111; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #222; color: #fff; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: #fff; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat">
    <div class="msg bot">Opa! Gordinho.IA na área. Manda um "oi" pra testar!</div>
</div>

<div id="input-area">
    <input type="text" id="mensagem" placeholder="Digite aqui..." onkeypress="if(event.key === 'Enter') enviar()">
    <button onclick="enviar()">Enviar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDWH4Zp1XfWLeRtHMJjsI_b9mw_f68bpOY",
        authDomain: "gordinhoia.firebaseapp.com",
        projectId: "gordinhoia",
        databaseURL: "https://gordinhoia-default-rtdb.firebaseio.com/",
        appId: "1:282661207508:web:1560e786e7c784c505aa41"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const chatRef = ref(db, 'mensagens');

    const GEMINI_KEY = "AIzaSyDnj6gJwAcOFWRhMW_6gaVhwqjvVr_yCZM";
    const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + GEMINI_KEY;

    window.enviar = async () => {
        const input = document.getElementById('mensagem');
        const texto = input.value.trim();
        if (!texto) return;

        // Salva mensagem do usuário
        await push(chatRef, { texto: texto, tipo: "user" });
        input.value = "";

        try {
            const response = await fetch(GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: texto }] }] })
            });
            const data = await response.json();
            if (data.candidates && data.candidates[0]) {
                const respostaIA = data.candidates[0].content.parts[0].text;
                await push(chatRef, { texto: respostaIA, tipo: "bot" });
            }
        } catch (e) { console.error(e); }
    };

    onChildAdded(chatRef, (snap) => {
        const msg = snap.val();
        const div = document.createElement('div');
        div.className = "msg " + msg.tipo;
        div.innerText = msg.texto;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    });
</script>
</body>
</html>
