<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Chat</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: #0b0e11; 
            color: #e3e6e8; 
            margin: 0;
            padding: 20px;
        }
        h2 { color: #f55036; text-transform: uppercase; letter-spacing: 2px; }
        #chat-container { 
            width: 100%; 
            max-width: 600px; 
            background: #1c2128;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #30363d;
        }
        #chat { 
            height: 450px; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user { background: #f55036; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ia { background: #30363d; color: #e3e6e8; align-self: flex-start; border-bottom-left-radius: 4px; }
        
        .input-area { 
            display: flex; 
            padding: 15px; 
            background: #22272e; 
            border-top: 1px solid #30363d; 
        }
        input { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #0d1117; 
            color: white; 
            outline: none;
            font-size: 16px;
        }
        button { 
            margin-left: 10px; 
            padding: 0 25px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            background: #f55036; 
            color: white; 
            font-weight: bold; 
            transition: 0.2s;
        }
        button:hover { background: #d43f2a; }
        button:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
        
        /* Scrollbar bonitinha */
        #chat::-webkit-scrollbar { width: 6px; }
        #chat::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

    <h2>GORDINHO.IA (BETA)</h2>
    
    <div id="chat-container">
        <div id="chat">
            <div class="message ia">Olá! Sou a Gordinho I.A. Como posso te ajudar hoje?</div>
        </div>
        <div class="input-area">
            <input type="text" id="pergunta" placeholder="Escreva sua mensagem..." autocomplete="off" onkeypress="if(event.key === 'Enter') perguntarIA()">
            <button id="btnEnviar" onclick="perguntarIA()">Enviar</button>
        </div>
    </div>

    <script>
        // CHAVE ATUALIZADA
        const API_KEY = "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";

        async function perguntarIA() {
            const input = document.getElementById('pergunta');
            const chat = document.getElementById('chat');
            const btn = document.getElementById('btnEnviar');
            const texto = input.value.trim();

            if (!texto) return;

            btn.disabled = true;
            input.value = '';

            // Adiciona mensagem do usuário na tela
            chat.innerHTML += `<div class="message user">${texto}</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "user", content: texto }],
                        temperature: 0.7
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    // Se a Groq retornar erro, mostra o motivo real aqui
                    throw new Error(data.error ? data.error.message : "Erro na API");
                }

                const respostaIA = data.choices[0].message.content;
                chat.innerHTML += `<div class="message ia">${respostaIA}</div>`;
                
            } catch (error) {
                console.error("Erro detalhado:", error);
                chat.innerHTML += `<div class="message ia" style="color: #ff6b6b; border: 1px solid #ff6b6b; background: rgba(255,107,107,0.1);">
                    <strong>Erro:</strong> ${error.message}<br>
                    <small>Tente gerar uma nova chave no site da Groq se o erro persistir.</small>
                </div>`;
            }

            btn.disabled = false;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
