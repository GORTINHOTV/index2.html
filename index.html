<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Chat & Foto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px; border-radius: 15px; max-width: 80%; word-wrap: break-word; }
        .user { background: #007bff; align-self: flex-end; }
        .bot { background: #2c2c2c; align-self: flex-start; }
        .error { background: #4a1a1a; color: #ff8888; align-self: center; font-size: 13px; }
        #input-area { padding: 15px; background: #121212; display: flex; gap: 10px; border-top: 1px solid #333; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #444; background: #1e1e1e; color: white; outline: none; }
        button { padding: 10px 20px; background: #28a745; border: none; color: white; cursor: pointer; border-radius: 20px; font-weight: bold; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message bot">Opa! Gordinho.IA na área. Manda um "oi" pra testar!</div>
</div>

<div id="input-area">
    <input type="file" id="foto-input" accept="image/*" style="display:none">
    <button onclick="document.getElementById('foto-input').click()">📸</button>
    <input type="text" id="user-input" placeholder="Digite aqui..." onkeypress="if(event.key === 'Enter') enviarMensagem()">
    <button onclick="enviarMensagem()">Enviar</button>
</div>

<script>
    // Se o seu token hf_OzCm... não funcionar, gere um novo tipo "READ"
    const HF_TOKEN = "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"; 
    const MODEL_URL = "https://api-inference.huggingface.co/models/HuggingFaceH4/zephyr-7b-beta";

    async function enviarMensagem() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        adicionarMensagem(text, 'user');
        input.value = '';

        const tempId = Date.now();
        adicionarMensagem("Pensando...", 'bot', tempId);

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    inputs: text,
                    parameters: { max_new_tokens: 200 }
                })
            });

            const data = await response.json();
            document.getElementById(tempId).remove();

            if (response.ok) {
                // Zephyr costuma retornar uma lista
                const resposta = data[0]?.generated_text || data.generated_text;
                adicionarMensagem(resposta.replace(text, "").trim(), 'bot');
            } else if (response.status === 503) {
                adicionarMensagem("Servidor carregando... tente de novo em 10s.", 'error');
            } else {
                adicionarMensagem("Erro " + response.status + ": Token inválido?", 'error');
            }
        } catch (error) {
            document.getElementById(tempId).remove();
            adicionarMensagem("Erro de conexão. Tente novamente.", 'error');
        }
    }

    function adicionarMensagem(texto, tipo, id = null) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        if (id) div.id = id;
        div.innerText = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }
</script>
</body>
</html>
