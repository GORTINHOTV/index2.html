<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Realtime</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 15px; max-width: 80%; font-size: 16px; line-height: 1.4; }
        .user { background: #007bff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background: #2c2c2c; align-self: flex-start; border-bottom-left-radius: 2px; }
        #input-area { padding: 15px; background: #121212; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #444; background: #1e1e1e; color: white; outline: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="mensagem" placeholder="Manda um salve pro Gordinho..." onkeypress="if(event.key === 'Enter') enviar()">
    <button onclick="enviar()">Enviar</button>
</div>

<script type="module">
  // Carregando o Firebase de um jeito que funciona direto no GitHub Pages
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // Suas chaves que você acabou de pegar!
  const firebaseConfig = {
    apiKey: "AIzaSyDWH4Zp1XfWLeRtHMJjsI_b9mw_f68bpOY",
    authDomain: "gordinhoia.firebaseapp.com",
    projectId: "gordinhoia",
    databaseURL: "https://gordinhoia-default-rtdb.firebaseio.com/",
    storageBucket: "gordinhoia.firebasestorage.app",
    messagingSenderId: "282661207508",
    appId: "1:282661207508:web:1560e786e7c784c505aa41"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const chatRef = ref(db, 'mensagens');

  // Função para enviar a mensagem para o banco do Google
  window.enviar = () => {
    const input = document.getElementById('mensagem');
    const texto = input.value.trim();
    
    if (texto !== "") {
      push(chatRef, {
        nome: "Brunno",
        texto: texto,
        tipo: "user",
        timestamp: Date.now()
      });
      input.value = "";
    }
  };

  // Essa parte faz a mágica: quando chega mensagem no banco, ela brota na tela
  onChildAdded(chatRef, (snapshot) => {
    const msg = snapshot.val();
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${msg.tipo}`;
    div.innerText = msg.texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight; // Sempre desce o chat pro final
  });
</script>

</body>
</html>
