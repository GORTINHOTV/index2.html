<!DOCTYPE html>

    <script>
        const GEMINI_API_KEY = "AIzaSyAm5stEPqneCrmfCmGIVm_6OOtKZfZ3B0g";

        const chatDiv = document.getElementById('chat');

        function falar(texto) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'pt-BR';
            window.speechSynthesis.speak(utterance);
        }

        async function toggleScreenShare() {
            const btn = document.getElementById('btnTela');
            if (screenStream) {
                screenStream.getTracks().forEach(t => t.stop());
                screenStream = null;
                btn.classList.remove('btn-active');

                } catch (e) { alert("Permita o acesso à tela."); }
            }
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Image = e.target.result.split(',')[1];
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-container').style.display = "block";
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function capturarFrameTela() {
            const video = document.createElement('video');
            video.srcObject = screenStream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const data = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];
            video.pause();
            return data;
        }

*   O endpoint agora é: `.../v1/models/gemini-1.5-flash-latest:generateContent...`
*   Adicionar o **`-latest`** força a API a pegar a versão mais recente disponível para a sua chave, ignorando se ela é beta ou estável.

**Última dica importante:** Como você está subindo isso no GitHub, o cache do navegador é seu pior inimigo. Toda vez que você atualizar o código:
1.  Dê o `commit` e o `push`.
2.  Espere 30 segundos.
3.  No seu navegador, aperte **Ctrl + F5** (limpa o cache da página) para garantir que ele não está rodando a versão velha do script que deu erro.
