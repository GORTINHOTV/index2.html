<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO.IA - Chat & Foto</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #1e88e5; align-self: flex-end; margin-left: auto; }
        .bot { background: #333; align-self: flex-start; }
        #input-area { padding: 20px; background: #1e1e1e; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #4caf50; border: none; color: white; cursor: pointer; border-radius: 5px; }
        #preview { max-width: 200px; display: block; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="message bot">Olá! Mande uma mensagem ou uma foto para o Gordinho.IA.</div>
</div>

<div id="input-area">
    <input type="file" id="foto-input" accept="image/*" style="display:none">
    <button onclick="document.getElementById('foto-input').click()">📸</button>
    <input type="text" id="user-input" placeholder="Digite sua mensagem...">
    <button onclick="enviarMensagem()">Enviar</button>
</div>

<script>
    const HF_TOKEN = "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"; // Seu token atual
    const MODEL_URL = "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.3";

    async function enviarMensagem() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if (!text) return;

        adicionarMensagem(text, 'user');
        input.value = '';

        try {
            const response = await fetch(MODEL_URL, {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ inputs: text })
            });

            const data = await response.json();
            const respostaIA = data[0]?.generated_text || "Erro ao processar.";
            // Limpa o prompt da resposta se o modelo repetir a pergunta
            const respostaLimpa = respostaIA.replace(text, "").trim();
            adicionarMensagem(respostaLimpa, 'bot');
        } catch (error) {
            adicionarMensagem("Erro de conexão com o servidor.", 'bot');
        }
    }

    function adicionarMensagem(texto, tipo) {
        const container = document.getElementById('chat-container');
        const div = document.createElement('div');
        div.className = `message ${tipo}`;
        div.innerText = texto;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // Lógica simples para mostrar que a foto foi selecionada
    document.getElementById('foto-input').onchange = function(e) {
        adicionarMensagem("Foto selecionada! (Lógica de análise de imagem pode ser adicionada aqui)", 'user');
    };
</script>

</body>
</html>
