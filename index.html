<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gordinho Search - Automatizado</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .search-box { background: #111; padding: 30px; border-radius: 15px; border: 2px solid #e50914; display: inline-block; width: 100%; max-width: 500px; }
        input { width: 80%; padding: 15px; border-radius: 5px; border: none; margin-bottom: 20px; font-size: 1rem; }
        button { padding: 15px 30px; background: #e50914; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 20px; color: #aaa; font-style: italic; }
        #linkFinal { margin-top: 20px; padding: 20px; background: #222; border-radius: 10px; display: none; word-break: break-all; border: 1px solid #28a745; }
    </style>
</head>
<body>

<div class="search-box">
    <h1 style="color:#e50914">GORDINHO SEARCH</h1>
    <p>Digite o nome do filme e eu busco o link pra você:</p>
    <br>
    <input type="text" id="movieName" placeholder="Ex: Velozes e Furiosos 10">
    <br>
    <button onclick="buscarAutomatico()">BUSCAR AGORA 🚀</button>
    <div id="status"></div>
    
    <div id="linkFinal">
        <strong style="color:#28a745">Link Encontrado:</strong><br><br>
        <span id="urlGerada"></span><br><br>
        <button onclick="copiar()" style="background:#444; padding:5px 10px;">COPIAR LINK</button>
    </div>
</div>

<script>
    async function buscarAutomatico() {
        const nome = document.getElementById('movieName').value;
        const status = document.getElementById('status');
        const resBox = document.getElementById('linkFinal');
        const urlGerada = document.getElementById('urlGerada');

        if(!nome) return alert("Digite um nome!");

        status.innerText = "🔍 Buscando no Pobreflix...";
        resBox.style.display = "none";

        try {
            // 1. FAZ A BUSCA PELO NOME
            const searchUrl = `https://www.pobreflixtv.sarl/?s=${encodeURIComponent(nome)}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`;
            
            const response = await fetch(proxy);
            const data = await response.json();
            const html = data.contents;

            // 2. TENTA ACHAR O LINK DO PRIMEIRO FILME NA BUSCA
            // No Pobreflix, os links de filmes ficam dentro de tags 'a' com títulos
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const primeiroLink = doc.querySelector('.result-item a') || doc.querySelector('.items article a');

            if (primeiroLink) {
                const urlFilme = primeiroLink.href;
                status.innerText = "✅ Filme encontrado! Extraindo Streamtape...";

                // 3. ENTRA NA PÁGINA DO FILME PARA PEGAR O STREAMTAPE
                const proxyFilme = `https://api.allorigins.win/get?url=${encodeURIComponent(urlFilme)}`;
                const responseFilme = await fetch(proxyFilme);
                const dataFilme = await responseFilme.json();
                const htmlFilme = dataFilme.contents;

                const regex = /https?:\/\/streamtape\.com\/(v|e)\/[a-zA-Z0-9]+/g;
                const matches = htmlFilme.match(regex);

                if (matches) {
                    let final = matches[0].replace('/v/', '/e/');
                    urlGerada.innerText = final;
                    resBox.style.display = "block";
                    status.innerText = "✨ Tudo pronto!";
                } else {
                    status.innerText = "❌ Filme achado, mas sem link Streamtape.";
                }
            } else {
                status.innerText = "❌ Nenhum filme com esse nome foi encontrado.";
            }
        } catch (e) {
            status.innerText = "❌ Erro na conexão automática.";
            console.error(e);
        }
    }

    function copiar() {
        const txt = document.getElementById('urlGerada').innerText;
        navigator.clipboard.writeText(txt);
        alert("Copiado!");
    }
</script>

</body>
</html>
