<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO TV - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #141414; padding: 2rem; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: #333; border: none; color: white; border-radius: 5px; }
        .btn-red { width: 100%; padding: 1rem; background: #e50914; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        #mainApp { display: none; padding-top: 140px; }
        header { background: rgba(0,0,0,0.95); padding: 1rem 0; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #searchBar { width: 100%; background: #222; border: 1px solid #444; padding: 12px; color: white; border-radius: 5px; }

        .admin-only { display: none !important; }
        .is-admin .admin-only { display: inline-block !important; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #222; }
        .card-info { padding: 15px; }
        .play-btn { width: 100%; padding: 10px; background: white; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(229, 9, 20, 0.9); border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; z-index: 10; font-weight: bold; font-size: 0.7rem; }
        
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; }
        .player-header { padding: 15px; background: #141414; display: flex; justify-content: space-between; align-items: center; }
        #playerContent { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top:0; left:0; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:#e50914; margin-bottom:20px;">GORDINHO TV</h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-red" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="container">
                <div class="header-top">
                    <div style="font-size: 1.5rem; font-weight: bold; color:#e50914;">GORTINHO TV</div>
                    <div>
                        <button class="admin-only" onclick="document.getElementById('modal').style.display='flex'" style="background:#e50914; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">+ ADD FILME</button>
                        <button onclick="sair()" style="background:none; color:gray; border:none; padding:8px; cursor:pointer; font-size:0.8rem;">Sair</button>
                    </div>
                </div>
                <input type="text" id="searchBar" placeholder="Pesquisar filme ou série..." onkeyup="filtrarFilmes()">
            </div>
        </header>
        <div class="container"><div id="grid" class="grid"></div></div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left;">
            <h3 style="color:#e50914;">Novo Filme</h3>
            <input type="text" id="fUrl" placeholder="Link do Filme">
            <input type="text" id="fTitle" placeholder="Título">
            <input type="number" id="fRating" placeholder="Nota (1-10)">
            <textarea id="fDesc" placeholder="Sinopse"></textarea>
            <button class="btn-red" onclick="salvarNoFirebase()">SALVAR NA NUVEM</button>
            <button onclick="document.getElementById('modal').style.display='none'" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="videoOverlay">
        <div class="player-header">
            <span id="playingTitle" style="font-weight:bold;">Assistindo...</span>
            <button onclick="fecharPlayer()" style="background:#e50914; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">FECHAR X</button>
        </div>
        <div id="playerContent"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnzpPFdXKzmQbEOkAyY9Y1PJ1tl8cX5VA",
            authDomain: "gordinhotv-25f29.firebaseapp.com",
            databaseURL: "https://gordinhotv-25f29-default-rtdb.firebaseio.com",
            projectId: "gordinhotv-25f29",
            storageBucket: "gordinhotv-25f29.firebasestorage.app",
            messagingSenderId: "416261508283",
            appId: "1:416261508283:web:53960003c89a9df7de2d9e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let isAdminAtivo = false;

        function entrar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if (u === "Miguel" && (p === "260711" || p === "123")) {
                isAdminAtivo = true;
                carregarApp(true);
                return;
            }
            alert("Acesso Negado!");
        }

        function carregarApp(isAdmin) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(isAdmin) document.getElementById('mainApp').classList.add('is-admin');
            escutarBanco();
        }

        function sair() { location.reload(); }

        function abrirPlayer(url, titulo) {
            let finalUrl = url;
            if(url.includes('streamtape.com')) finalUrl = url.replace('/v/', '/e/').split('?')[0];
            if(url.includes('drive.google.com')) finalUrl = url.replace('/view', '/preview');

            document.getElementById('playingTitle').innerText = titulo;
            document.getElementById('playerContent').innerHTML = `<iframe src="${finalUrl}" allow="autoplay; fullscreen" allowfullscreen referrerpolicy="no-referrer-when-downgrade"></iframe>`;
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        function fecharPlayer() { 
            document.getElementById('playerContent').innerHTML = ""; 
            document.getElementById('videoOverlay').style.display = 'none'; 
        }

        function salvarNoFirebase() {
            const id = Date.now();
            const movie = { title: document.getElementById('fTitle').value, url: document.getElementById('fUrl').value, rating: document.getElementById('fRating').value, desc: document.getElementById('fDesc').value, id: id };
            db.ref('filmes/' + id).set(movie);
            document.getElementById('modal').style.display = 'none';
        }

        function escutarBanco() {
            db.ref('filmes').on('value', (snap) => {
                const grid = document.getElementById('grid');
                grid.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(m => {
                        let btnDel = isAdminAtivo ? `<button class="del-btn" onclick="deletarFilme('${m.id}')">Excluir X</button>` : '';
                        grid.innerHTML += `
                            <div class="card" id="card-${m.id}">
                                ${btnDel}
                                <div style="height:150px; background:#222; display:flex; align-items:center; justify-content:center; font-size:3rem;">🎬</div>
                                <div class="card-info">
                                    <div class="card-title">${m.title}</div>
                                    <div class="card-meta">⭐ ${m.rating}/10</div>
                                    <p style="font-size:0.8rem; color:#aaa;">${m.desc}</p>
                                    <button class="play-btn" onclick="abrirPlayer('${m.url}', '${m.title}')">ASSISTIR AGORA</button>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        // FUNÇÃO DE EXCLUSÃO "FORÇADA" PARA LIMPAR O BANCO
        function deletarFilme(id) {
            if(confirm("Deseja realmente apagar este filme permanentemente?")) {
                // Remove do banco de dados
                db.ref('filmes/' + id).remove()
                .then(() => {
                    // Remove visualmente da tela na hora, caso o Firebase demore a responder
                    const card = document.getElementById('card-' + id);
                    if(card) card.remove();
                    console.log("Removido com sucesso.");
                })
                .catch((e) => alert("Erro ao deletar: " + e.message));
            }
        }

        function filtrarFilmes() {
            const termo = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const title = card.querySelector('.card-title').innerText.toLowerCase();
                card.style.display = title.includes(termo) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
