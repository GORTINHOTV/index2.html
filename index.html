<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GORDINHO TV - Oficial</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; }
        #loginScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: #141414; padding: 2rem; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #222; }
        input, select, textarea { width: 100%; padding: 0.8rem; margin: 0.5rem 0; background: #333; border: none; color: white; border-radius: 5px; }
        .btn-red { width: 100%; padding: 1rem; background: #e50914; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        #mainApp { display: none; padding-top: 140px; }
        header { background: rgba(0,0,0,0.95); padding: 1rem 0; position: fixed; top: 0; width: 100%; z-index: 1000; border-bottom: 1px solid #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #searchBar { width: 100%; background: #222; border: 1px solid #444; padding: 12px; color: white; border-radius: 5px; }

        .admin-only { display: none !important; }
        .is-admin .admin-only { display: inline-block !important; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 0; }
        .card { background: #181818; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #222; }
        .card-info { padding: 15px; }
        .play-btn { width: 100%; padding: 10px; background: white; color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); border: none; color: white; padding: 5px; border-radius: 5px; cursor: pointer; z-index: 10; }

        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; flex-direction: column; }
        .player-header { padding: 15px; background: #141414; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .tmdb-item:hover { background: #444 !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h1 style="color:#e50914; margin-bottom:20px;">GORDINHO TV</h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-red" onclick="entrar()">ENTRAR</button>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="container">
                <div class="header-top">
                    <div style="font-size: 1.5rem; font-weight: bold; color:#e50914;">GORDINHO TV</div>
                    <div>
                        <button class="admin-only" onclick="abrirModalUsers()" style="background:#333; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-right:5px;">👥 USUÁRIOS</button>
                        <button class="admin-only" onclick="document.getElementById('modal').style.display='flex'" style="background:#e50914; color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">+ ADD FILME</button>
                        <button onclick="sair()" style="background:none; color:gray; border:none; padding:8px; cursor:pointer; font-size:0.8rem;">Sair</button>
                    </div>
                </div>
                <input type="text" id="searchBar" placeholder="Pesquisar filme ou série..." onkeyup="filtrarFilmes()">
            </div>
        </header>
        <div class="container"><div id="grid" class="grid"></div></div>
    </div>

    <div id="modalUsers" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left; max-width: 450px;">
            <h3 style="color:#e50914; margin-bottom:10px;">Gerenciar Acessos</h3>
            <input type="text" id="newU" placeholder="Nome do Usuário">
            <input type="text" id="newP" placeholder="Senha">
            <div style="display: flex; gap: 10px;">
                <input type="number" id="timeVal" placeholder="Valor" style="flex: 1;">
                <select id="timeUnit" style="flex: 1.5;">
                    <option value="min">Minutos</option>
                    <option value="hor">Horas</option>
                    <option value="dia" selected>Dias</option>
                    <option value="mes">Meses</option>
                </select>
            </div>
            <input type="number" id="newLimit" placeholder="Limite de Telas" value="1">
            <div id="admToggleOption" style="display:none; margin: 10px 0; align-items: center; gap: 10px; font-size: 0.9rem;">
                <input type="checkbox" id="isAdmCheck" style="width: 20px; height: 20px;"> 
                <span>Dar acesso de Administrador?</span>
            </div>
            <button class="btn-red" onclick="salvarUsuario()">CRIAR ACESSO</button>
            <div id="listaU" style="margin-top:15px; background:#222; border-radius:5px; max-height:200px; overflow-y:auto; padding:10px;"></div>
            <button onclick="fecharModalUsers()" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Fechar</button>
        </div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; align-items:center; justify-content:center;">
        <div class="login-box" style="text-align: left;">
            <h3 style="color:#e50914;">Novo Filme</h3>
            <div style="display: flex; gap: 5px;">
                <input type="text" id="tmdbSearch" placeholder="Nome do filme...">
                <button onclick="buscarNoTMDB()" style="background: #222; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; cursor: pointer;">🔍</button>
            </div>
            <div id="tmdbResults" style="display:none; background:#222; margin-top:5px; border-radius:5px; max-height:150px; overflow-y:auto; border:1px solid #444; font-size:0.8rem;"></div>

            <input type="text" id="fUrl" placeholder="Link do Filme">
            <input type="text" id="fTitle" placeholder="Título">
            <input type="hidden" id="fPoster">
            <input type="number" id="fRating" placeholder="Nota (1-10)">
            <textarea id="fDesc" placeholder="Sinopse"></textarea>
            
            <button class="btn-red" onclick="salvarNoFirebase()">SALVAR NA NUVEM</button>
            <button onclick="fecharModalFilme()" style="width:100%; background:none; color:gray; border:none; margin-top:10px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div id="videoOverlay">
        <div class="player-header">
            <span id="playingTitle" style="font-weight:bold;">Assistindo...</span>
            <button onclick="fecharPlayer()" style="background:#e50914; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">FECHAR X</button>
        </div>
        <div id="playerContent" style="width:100%; height:100%;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnzpPFdXKzmQbEOkAyY9Y1PJ1tl8cX5VA",
            authDomain: "gordinhotv-25f29.firebaseapp.com",
            databaseURL: "https://gordinhotv-25f29-default-rtdb.firebaseio.com",
            projectId: "gordinhotv-25f29",
            storageBucket: "gordinhotv-25f29.firebasestorage.app",
            messagingSenderId: "416261508283",
            appId: "1:416261508283:web:53960003c89a9df7de2d9e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const TMDB_KEY = "8e6a4fe3b8b0c240511a0c5cc382ca81";

        let userLogado = "";
        let idSessao = "";
        let timerPainel = null;

        // BUSCA TMDB COM LISTA DE ESCOLHA
        async function buscarNoTMDB() {
            const query = document.getElementById('tmdbSearch').value;
            if (!query) return alert("Digite o nome!");
            const url = `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}&language=pt-BR`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                const lista = document.getElementById('tmdbResults');
                lista.innerHTML = "";
                if (data.results && data.results.length > 0) {
                    lista.style.display = "block";
                    data.results.forEach(f => {
                        const ano = f.release_date ? f.release_date.split('-')[0] : 'S/A';
                        const item = document.createElement('div');
                        item.className = "tmdb-item";
                        item.style = "padding:10px; border-bottom:1px solid #333; cursor:pointer; color:white; background:#333;";
                        item.innerHTML = `<strong>${f.title}</strong> (${ano})`;
                        item.onclick = () => {
                            document.getElementById('fTitle').value = f.title;
                            document.getElementById('fRating').value = f.vote_average.toFixed(1);
                            document.getElementById('fDesc').value = f.overview;
                            document.getElementById('fPoster').value = `https://image.tmdb.org/t/p/w500${f.poster_path}`;
                            lista.style.display = "none";
                            document.getElementById('tmdbSearch').value = f.title;
                        };
                        lista.appendChild(item);
                    });
                } else { alert("Nenhum filme encontrado."); }
            } catch (e) { alert("Erro na busca."); }
        }

        function fecharModalFilme() {
            document.getElementById('modal').style.display='none';
            document.getElementById('tmdbResults').style.display = "none";
        }

        function salvarNoFirebase() {
            const movie = { 
                title: document.getElementById('fTitle').value, 
                url: document.getElementById('fUrl').value, 
                rating: document.getElementById('fRating').value, 
                desc: document.getElementById('fDesc').value,
                poster: document.getElementById('fPoster').value || "",
                id: Date.now() 
            };
            if(!movie.url || !movie.title) return alert("Preencha Título e Link!");
            db.ref('filmes/' + movie.id).set(movie);
            document.getElementById('modal').style.display = 'none';
            // Limpa campos
            document.getElementById('fTitle').value = ""; document.getElementById('fUrl').value = "";
            document.getElementById('tmdbSearch').value = ""; document.getElementById('fPoster').value = "";
        }

        function entrar() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            if (u === "Miguel" && (p === "260711" || p === "123")) {
                userLogado = "Miguel"; carregarApp(true); return;
            }
            db.ref('usuarios').once('value').then((snap) => {
                const users = snap.val();
                let uId = null, dadosUser = null;
                if (users) {
                    Object.keys(users).forEach(key => {
                        if (users[key].nome === u && users[key].senha === p) { uId = key; dadosUser = users[key]; }
                    });
                }
                if (uId && dadosUser) {
                    if (Date.now() > dadosUser.expiraEm) return alert("Acesso expirado!");
                    userLogado = u; idSessao = uId;
                    const token = Date.now().toString();
                    sessionStorage.setItem('meuToken', token);
                    db.ref('usuarios/' + uId).update({ online: true, sessionToken: token }).catch(e => {});
                    carregarApp(dadosUser.isAdmin);
                } else { alert("Login inválido!"); }
            });
        }

        function carregarApp(isAdmin) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            if(isAdmin) document.getElementById('mainApp').classList.add('is-admin');
            if(userLogado === "Miguel") document.getElementById('admToggleOption').style.display = 'flex';
            escutarBanco();
        }

        function sair() { location.reload(); }

        function salvarUsuario() {
            const nome = document.getElementById('newU').value;
            const senha = document.getElementById('newP').value;
            const val = parseInt(document.getElementById('timeVal').value);
            const unit = document.getElementById('timeUnit').value;
            if(!nome || !senha || isNaN(val)) return alert("Preencha tudo!");
            let ms = val * 1000;
            if(unit === "min") ms *= 60; else if(unit === "hor") ms *= 3600; else if(unit === "dia") ms *= 86400; else if(unit === "mes") ms *= 86400 * 30;
            db.ref('usuarios').push({ nome, senha, expiraEm: Date.now() + ms, isAdmin: document.getElementById('isAdmCheck').checked });
            alert("Criado!");
        }

        function abrirModalUsers() {
            document.getElementById('modalUsers').style.display = 'flex';
            if(timerPainel) clearInterval(timerPainel);
            timerPainel = setInterval(() => {
                db.ref('usuarios').once('value', (snap) => {
                    const lista = document.getElementById('listaU');
                    lista.innerHTML = ""; const data = snap.val();
                    if(data) {
                        Object.keys(data).forEach(id => {
                            lista.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #333;">
                                <span>${data[id].nome}</span>
                                <button onclick="db.ref('usuarios/${id}').remove()" style="color:red; background:none; border:none; cursor:pointer;">X</button>
                            </div>`;
                        });
                    }
                });
            }, 2000);
        }

        function fecharModalUsers() { document.getElementById('modalUsers').style.display = 'none'; clearInterval(timerPainel); }

        function abrirPlayer(url, titulo) {
            let finalUrl = url;
            if(url.includes('streamtape.com')) finalUrl = url.replace('/v/', '/e/').split('?')[0];
            document.getElementById('playingTitle').innerText = titulo;
            document.getElementById('playerContent').innerHTML = `<iframe src="${finalUrl}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        function fecharPlayer() { document.getElementById('playerContent').innerHTML = ""; document.getElementById('videoOverlay').style.display = 'none'; }

        function escutarBanco() {
            db.ref('filmes').on('value', (snap) => {
                const grid = document.getElementById('grid'); grid.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(m => {
                        grid.innerHTML += `
                            <div class="card">
                                ${(userLogado === "Miguel") ? `<button class="del-btn" onclick="db.ref('filmes/${m.id}').remove()">Excluir</button>` : ''}
                                <div style="height:180px; background: url('${m.poster || ''}') center/cover no-repeat; background-color:#222; display:flex; align-items:center; justify-content:center;">
                                    ${!m.poster ? '🎬' : ''}
                                </div>
                                <div class="card-info">
                                    <div class="card-title"><strong>${m.title}</strong></div>
                                    <div class="card-meta">⭐ ${m.rating}/10</div>
                                    <button class="play-btn" onclick="abrirPlayer('${m.url}', '${m.title}')">ASSISTIR</button>
                                </div>
                            </div>`;
                    });
                }
            });
        }

        function filtrarFilmes() {
            const termo = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const title = card.querySelector('.card-title').innerText.toLowerCase();
                card.style.display = title.includes(termo) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
